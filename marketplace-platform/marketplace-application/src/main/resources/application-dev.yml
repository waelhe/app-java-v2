# ============================================================================
# Marketplace Platform - Development Profile
# ============================================================================

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace_dev
    username: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    clean-disabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  port: 8080

logging:
  level:
    root: INFO
    com.marketplace: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springmodulith: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always