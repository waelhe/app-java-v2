# ============================================================================
# Marketplace Platform - Main Application Configuration
# ============================================================================

spring:
  application:
    name: marketplace-platform

  # ---------------------------------------------------------------------------
  # DataSource - PostgreSQL 18.3
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace
    username: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: marketplace-hikari

  # ---------------------------------------------------------------------------
  # JPA / Hibernate ORM 7.3.1
  # ---------------------------------------------------------------------------
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
    show-sql: false

  # ---------------------------------------------------------------------------
  # Flyway 11.3.4 - Database Migrations
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ---------------------------------------------------------------------------
  # Redis 8.6
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 3000

  # ---------------------------------------------------------------------------
  # Jackson 3.1.1
  # ---------------------------------------------------------------------------
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    date-format: com.fasterxml.jackson.databind.util.StdDateFormat
    time-zone: UTC

  # ---------------------------------------------------------------------------
  # Mail
  # ---------------------------------------------------------------------------
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ---------------------------------------------------------------------------
  # Servlet / Tomcat 11.0.21
  # ---------------------------------------------------------------------------
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# ============================================================================
# Server Configuration
# ============================================================================

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    connection-timeout: 20000
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# ============================================================================
# Spring Modulith 2.0.5
# ============================================================================

spring.modulith:
  events:
    completion-policy: complete-on-verify

# ============================================================================
# Management / Actuator / Observability
# ============================================================================

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
      otlp:
        enabled: true
        step: 1m
    tags:
      application: ${spring.application.name}
  observations:
    key-values:
      application: ${spring.application.name}

# ============================================================================
# Logging
# ============================================================================

logging:
  level:
    root: INFO
    com.marketplace: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId:-}, spanId=%X{spanId:-}] - %msg%n"