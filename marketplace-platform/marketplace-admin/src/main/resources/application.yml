# ============================================================================
# Marketplace Admin - Jmix FlowUI Configuration
# ============================================================================

spring:
  application:
    name: marketplace-admin

  # ---------------------------------------------------------------------------
  # DataSource - PostgreSQL
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace
    username: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # ---------------------------------------------------------------------------
  # JPA / EclipseLink (Jmix uses EclipseLink, not Hibernate)
  # ---------------------------------------------------------------------------
  jpa:
    open-in-view: false
    properties:
      eclipselink:
        weaving: false
        ddl-generation: none
        logging.level: INFO

  # ---------------------------------------------------------------------------
  # Flyway
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# ============================================================================
# Jmix Configuration
# ============================================================================

jmix:
  core:
    available-locales: en,ar
  flowui:
    menu:
      config: com/marketplace/admin/menu.xml
  security:
    default-permission-values-configs: com/marketplace/admin/permissions.xml

# ============================================================================
# Server
# ============================================================================

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: 30m

# ============================================================================
# Logging
# ============================================================================

logging:
  level:
    root: INFO
    com.marketplace: DEBUG
    io.jmix: INFO
    org.eclipse.persistence: WARN