# ============================================================================
# Marketplace Platform - Docker Compose (Development)
# ============================================================================

services:
  postgres:
    image: postgres:18.3
    container_name: marketplace-postgres
    environment:
      POSTGRES_DB: marketplace_dev
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6
    container_name: marketplace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: marketplace-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data: